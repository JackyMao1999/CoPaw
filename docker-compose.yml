version: '1.0'

volumes:
  copaw-data:
    name: copaw-data
  copaw-secrets:
    name: copaw-secrets

services:
  copaw:
    image: agentscope/copaw:latest
    container_name: copaw
    restart: always
    ports:
      - 8088:8088
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret
